  <meta charset="utf-8" />

  <title> ultimate showroom </title>
  <style>
    :root{
      --bg-color:#0b0f13;
      --card-bg:rgba(151, 150, 150, 0.103);
      --accent:#143de0;
      --glass: rgba(255,255,255,0.04);
      --text:#e6e3f2;
      --muted:#efeff6;
      --background-image: url('https://images6.alphacoders.com/109/thumb-1920-1090239.jpg');
      --max-width:1200px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;color:var(--text)}
    body{
      background-color:var(--bg-color);
      background-image: linear-gradient(rgba(3,6,10,0.75), rgba(3,6,10,0.75)), var(--background-image);
      background-size: cover;
      background-position: center;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:50px 20px;
      display:flex;justify-content:center;
    }
    .wrap{width:100%;max-width:var(--max-width)}
    header{display:flex;align-items:center;gap:16px;margin-bottom:22px}
    .logo{font-weight:700;font-size:22px;color:var(--accent)}
    .subtitle{color:var(--muted);font-size:13px}

    /* Controls */
    .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .search, .select{background:var(--glass);border:1px solid rgba(255,255,255,0.04);padding:10px 12px;border-radius:10px;color:var(--text)}
    .search input{background:transparent;border:0;outline:none;color:var(--text);width:260px}
    .select select{background:transparent;border:0;color:var(--text);outline:none}
    
    /*Grid */ 
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
    .card{background:var(--card-bg);border-radius:12px;padding:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.03);backdrop-filter: blur(4px)}
    .thumb{width:100%;height:160px;object-fit:cover;border-radius:8px;cursor:pointer;display:block}
    .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .meta h4{margin:0;font-size:16px}
    .meta .brand{font-size:13px;color:var(--muted)}
    .specs{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.3}

    footer{color:var(--muted);text-align:center;margin-top:28px;font-size:13px}

    /* Modal */
    .modal{position:fixed;inset:0;display:none;background:rgba(2,6,12,0.85);z-index:9999;align-items:center;justify-content:center;padding:24px}
    .modal.open{display:flex}
    .modal-content{max-width:1200px;width:100%;display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
    .modal-left{display:flex;flex-direction:column;gap:12px}
    .modal-img-wrap{background:#071017;border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:center}
    .modal-img{max-width:100%;max-height:75vh;transform-origin:center center;transition:transform .12s ease}
    .zoom-controls{display:flex;gap:8px}
    .btn{background:var(--glass);border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text)}
    .details{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.015));border-radius:10px;padding:14px;color:var(--muted)}
    .details h2{margin:0 0 6px 0;color:var(--text)}
    .close{position:absolute;top:20px;right:24px;padding:8px;border-radius:8px;background:transparent;border:0;color:var(--muted);cursor:pointer}

    @media (max-width:900px){
      .modal-content{grid-template-columns:1fr}
      .modal-left{order:2}
      .details{order:1}
    }

    /* small helpers */
    .badge{background:rgba(223, 18, 18, 0.938);padding:6px 8px;border-radius:6px;font-size:12px}
    .muted{color:var(--muted)}
  </style>
</head>

    // Populate brand filter options (unique brands)
    const brandFilterSelect = document.getElementById('brandFilter');
    const uniqueBrands = Array.from(new Set(cars.map(c => c.brand)));
    uniqueBrands.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b;
      opt.textContent = b;
      brandFilterSelect.appendChild(opt);
    });

    // DOM elements
    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('searchInput');
    const brandFilter = document.getElementById('brandFilter');

    // Render function
    function render(items){
      gallery.innerHTML = items.map(car => `
        <article class="card" data-id="${car.id}" data-brand="${car.brand}" data-model="${car.model}">
          <img loading="lazy" src="${car.image}" alt="${car.brand} ${car.model}" class="thumb" data-id="${car.id}" />
          <div class="meta">
            <h4>${car.model}</h4>
            <div class="brand">${car.brand} • ${car.year}</div>
          </div>
          <div class="specs">${car.desc}</div>
        </article>
      `).join('');
    }

    // Initial render
    render(cars);

    // Filtering
    function filterAndRender(){
      const q = searchInput.value.trim().toLowerCase();
      const selectedBrand = brandFilter.value;
      const filtered = cars.filter(c => {
        if(selectedBrand !== 'all' && c.brand !== selectedBrand) return false;
        if(!q) return true;
        const combined = (c.brand + ' ' + c.model + ' ' + c.year + ' ' + c.desc + ' ' + (c.specs || []).join(' ')).toLowerCase();
        return combined.includes(q);
      });
      render(filtered);
    }

    searchInput.addEventListener('input', filterAndRender);
    brandFilter.addEventListener('change', filterAndRender);

    // Modal logic
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const detailTitle = document.getElementById('detailTitle');
    const detailBrand = document.getElementById('detailBrand');
    const detailDesc = document.getElementById('detailDesc');
    const detailSpecs = document.getElementById('detailSpecs');
    const closeBtn = document.getElementById('closeBtn');
    const zoomInBtn = document.getElementById('zoomIn');
    const zoomOutBtn = document.getElementById('zoomOut');
    const resetZoomBtn = document.getElementById('resetZoom');

    let currentScale = 1;
    const SCALE_STEP = 0.15;

    function openModal(car){
      modal.classList.add('open');
      modal.setAttribute('aria-hidden','false');
      modalImg.src = car.image;
      modalImg.style.transform = 'scale(1)';
      currentScale = 1;
      detailTitle.textContent = car.model;
      detailBrand.textContent = `${car.brand} • ${car.year}`;
      detailDesc.textContent = car.desc;
      detailSpecs.innerHTML = (car.specs || []).map(s => `<li>${s}</li>`).join('');
      closeBtn.focus();
    }

    function closeModal(){
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden','true');
      modalImg.src = '';
    }

    gallery.addEventListener('click', (e) => {
      const img = e.target.closest('.thumb');
      if(!img) return;
      const id = Number(img.dataset.id);
      const car = cars.find(c => c.id === id);
      if(car) openModal(car);
    });

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if(e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeModal();
    });

    zoomInBtn.addEventListener('click', () => {
      currentScale += SCALE_STEP;
      modalImg.style.transform = `scale(${currentScale})`;
    });
    zoomOutBtn.addEventListener('click', () => {
      currentScale = Math.max(0.3, currentScale - SCALE_STEP);
      modalImg.style.transform = `scale(${currentScale})`;
    });
    resetZoomBtn.addEventListener('click', () => {
      currentScale = 1;
      modalImg.style.transform = 'scale(1)';
    });

    // Double click to toggle zoom
    modalImg.addEventListener('dblclick', () => {
      currentScale = (currentScale > 1) ? 1 : 2;
      modalImg.style.transform = `scale(${currentScale})`;
    });
  </script>
